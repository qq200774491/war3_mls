<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLS Simulator</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <h1>MLS Simulator</h1>
        <span class="subtitle">Rust Edition</span>
        <span class="ws-status disconnected" id="ws-status">Disconnected</span>
    </header>

    <div class="container">
        <aside class="sidebar">
            <div class="panel-header">
                <h2>Rooms</h2>
                <button class="btn btn-primary" onclick="showCreateRoom()">+ New</button>
            </div>
            <div id="room-list"></div>
        </aside>

        <main class="main-content" id="main-content">
            <div class="placeholder" id="no-room-selected">
                <p>Select or create a room to begin</p>
            </div>

            <div id="room-detail" style="display:none">
                <div class="room-header">
                    <div>
                        <h2 id="room-title"></h2>
                        <span class="badge" id="room-status"></span>
                        <span class="info-text" id="room-info"></span>
                    </div>
                    <div class="room-actions">
                        <button class="btn btn-success" onclick="startRoom()">Start</button>
                        <button class="btn btn-warning" onclick="stopRoom()">Stop</button>
                        <button class="btn btn-danger" onclick="destroyRoom()">Destroy</button>
                    </div>
                </div>

                <div class="section">
                    <div class="panel-header">
                        <h3>Players</h3>
                    </div>
                    <div id="player-list" class="player-grid"></div>
                </div>

                <div class="two-col">
                    <div class="section">
                        <h3>Send Event</h3>
                        <div class="form-group">
                            <label>Event Name</label>
                            <input type="text" id="event-name" placeholder="e.g. buy_tower">
                        </div>
                        <div class="form-group">
                            <label>Event Data</label>
                            <textarea id="event-data" rows="2" placeholder='e.g. {"action":"buy"}'></textarea>
                        </div>
                        <div class="form-group">
                            <label>Player Index</label>
                            <select id="event-player"></select>
                        </div>
                        <button class="btn btn-primary" onclick="sendEvent()">Send</button>

                        <div class="presets" id="event-presets">
                            <span class="label">Presets:</span>
                        </div>
                    </div>

                    <div class="section">
                        <h3>State Inspector</h3>
                        <div id="state-inspector" class="state-box">
                            <pre id="state-json">Click "Refresh" to view state</pre>
                        </div>
                        <button class="btn" onclick="refreshState()">Refresh</button>
                    </div>
                </div>

                <div class="section">
                    <div class="tab-bar">
                        <button class="tab active" onclick="switchTab(this, 'log-panel')">Logs</button>
                        <button class="tab" onclick="switchTab(this, 'event-panel')">Out Events</button>
                    </div>
                    <div class="log-controls">
                        <select id="log-level-filter" onchange="filterLogs()">
                            <option value="all">All Levels</option>
                            <option value="DBG">DBG</option>
                            <option value="INF">INF</option>
                            <option value="ERR">ERR</option>
                        </select>
                        <input type="text" id="log-search" placeholder="Filter..." oninput="filterLogs()">
                        <label><input type="checkbox" id="log-autoscroll" checked> Auto-scroll</label>
                        <button class="btn btn-small" onclick="clearLogs()">Clear</button>
                    </div>
                    <div id="log-panel" class="log-viewer"></div>
                    <div id="event-panel" class="log-viewer" style="display:none"></div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="create-modal" style="display:none">
        <div class="modal">
            <h2>Create Room</h2>
            <div class="form-group">
                <label>Script Directory</label>
                <input type="text" id="new-script-dir" placeholder="D:/path/to/script">
            </div>
            <div class="form-group">
                <label>Mode ID</label>
                <input type="number" id="new-mode-id" value="0">
            </div>
            <div class="form-group">
                <label>Players (JSON array)</label>
                <textarea id="new-players" rows="6">[
  {"index": 0, "name": "Alice", "items": {"VIP001": 1}},
  {"index": 1, "name": "Bob"}
]</textarea>
            </div>
            <div class="form-group">
                <label><input type="checkbox" id="new-auto-start" checked> Auto Start</label>
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="hideCreateRoom()">Cancel</button>
                <button class="btn btn-primary" onclick="createRoom()">Create</button>
            </div>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
