site_name: War3 MLS Tools
site_description: War3 MLS local cloud-script simulator, VSCode tools, and multi-instance testing guide.
repo_url: ""
theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - fenced_code
nav:
  - 首页: index.md
  - 快速开始: getting-started.md
  - VSCode 插件: vscode-extension.md
  - 云脚本模拟器: simulator.md
  - War3 多开测试: war3-multirun.md
  - Bridge 客户端集成: bridge.md
  - REST API: rest-api.md
  - MLS API 类型提示: mls-api.md
  - 生产环境差异: production-differences.md
  - FAQ: faq.md
  - 官方参考:
      - MLS 官方 README: ../参考/mls-master/README.md
      - 官方 API: ../参考/mls-master/API.md
      - KKWE 指南: ../参考/mls-master/KKWE.md
